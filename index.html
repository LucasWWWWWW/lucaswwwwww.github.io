<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2min每日早报</title>
  <meta name="description" content="用2分钟看懂昨日政治、经济、科技要事。" />
  <style>
    :root {
      --bg: #0b0f14;
      --card: #111827;
      --text: #f5f7fa;
      --muted: #b6c0cc;
      --line: rgba(255,255,255,.08);
      --blue: #93c5fd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .wrap {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .95rem;
    }

    .nav a:hover {
      color: var(--text);
    }

    .hero {
      padding: 28px 0 18px;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #172033;
      color: var(--blue);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.05;
    }

    .subtitle {
      max-width: 760px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 22px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 600;
      font-size: .95rem;
      border: 1px solid var(--line);
    }

    .btn-primary {
      background: var(--text);
      color: #0b0f14;
      border-color: transparent;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 10px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
    }

    .card-label {
      font-size: .8rem;
      color: var(--blue);
      margin-bottom: 10px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1.3rem;
      line-height: 1.35;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: .96rem;
    }

    .card a {
      color: var(--blue);
      text-decoration: none;
    }

    .footer {
      margin-top: 40px;
      color: #8190a5;
      font-size: .9rem;
    }

    @media (min-width: 780px) {
      .grid {
        grid-template-columns: 1.4fr .9fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">2min每日早报</div>
      <nav class="nav">
        <a href="./index.html">首页</a>
        <a href="./archive.html">历史日报</a>
      </nav>
    </header>

    <section class="hero">
      <div class="tag">全球要事压缩阅读</div>
      <h1>昨天世界发生了什么？</h1>
      <div class="subtitle">
        用 2 分钟快速看懂昨日政治、经济、科技三大领域的重要动态。首页看最新一期，归档页看历史日报。
      </div>

      <div class="actions">
        <a class="btn btn-primary" href="./2026-04-04.html">阅读最新一期</a>
        <a class="btn btn-secondary" href="./archive.html">查看历史归档</a>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <div class="card-label">最新一期</div>
        <h2><a href="./2026-04-04.html">2026-04-04 日报</a></h2>
        <p>
          包含政治、经济、科技三大领域的重点事件摘要，适合移动端快速阅读，也可在桌面端查看完整结构化展示。
        </p>
      </article>

      <aside class="card">
        <div class="card-label">历史入口</div>
        <h2><a href="./archive.html">进入 Archive</a></h2>
        <p>
          浏览过去的日报记录，后续会逐步扩展为按日期连续归档的内容库。
        </p>
      </aside>
    </section>

    <div class="footer">
      站点已成功部署在 GitHub Pages。下一步将继续完善导航、归档和分享预览。
    </div>
  </div>
</body>
</html>
