<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2min每日早报</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #0b0f14;
      color: #f5f7fa;
    }
    .wrap {
      width: min(920px, 92vw);
      margin: 0 auto;
      padding: 40px 0 72px;
    }
    h1 {
      font-size: clamp(28px, 6vw, 52px);
      line-height: 1.1;
      margin: 0 0 16px;
    }
    p {
      font-size: 16px;
      line-height: 1.75;
      color: #c9d1d9;
      margin: 0 0 16px;
    }
    .card {
      margin-top: 28px;
      background: #111827;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 20px;
    }
    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #1f2937;
      color: #93c5fd;
      margin-bottom: 12px;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tag">GitHub Pages 已上线</div>
    <h1>【2min每日早报】</h1>
    <p>这是站点的第一个测试页面。先把发布链路打通，再继续做日报模板、历史归档和 X 导流。</p>

    <div class="card">
      <p><strong>当前状态：</strong>站点初始化成功。</p>
      <p><strong>下一步目标：</strong>加入最新一期日报页面、archive 页面、移动端卡片布局。</p>
    </div>
  </div>
</body>
</html>
